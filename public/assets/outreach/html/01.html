<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>01 — noise&signal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700;800&family=Playfair+Display:wght@700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: #E8200A;
  font-family: 'Manrope', sans-serif;
}

.canvas {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  position: relative;
  background: #E8200A;
}

/* Geometric accent — large ghost circle top-right */
.circle {
  position: absolute;
  top: -180px;
  right: -180px;
  width: 640px;
  height: 640px;
  border-radius: 50%;
  border: 2px solid rgba(242,237,228,0.12);
  pointer-events: none;
}

.circle-2 {
  position: absolute;
  top: -80px;
  right: -80px;
  width: 440px;
  height: 440px;
  border-radius: 50%;
  border: 1px solid rgba(242,237,228,0.07);
  pointer-events: none;
}

/* Horizontal rule accent */
.rule {
  position: absolute;
  bottom: 220px;
  left: 72px;
  width: 120px;
  height: 3px;
  background: rgba(242,237,228,0.35);
}

.headline {
  position: absolute;
  bottom: 240px;
  left: 72px;
  right: 72px;
}

.headline h1 {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 122px;
  line-height: 0.9;
  letter-spacing: -4px;
  color: #f2ede4;
  text-transform: lowercase;
}

.headline h1 em {
  font-style: italic;
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  color: #f2ede4;
}

.sub {
  position: absolute;
  bottom: 176px;
  left: 72px;
  font-size: 15px;
  font-weight: 300;
  letter-spacing: 0.12em;
  color: rgba(242,237,228,0.5);
  text-transform: lowercase;
}

.brand {
  position: absolute;
  top: 52px;
  right: 60px;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.22em;
  color: rgba(242,237,228,0.38);
  text-transform: lowercase;
}

/* Vertical text left edge */
.vert {
  position: absolute;
  top: 50%;
  left: 28px;
  transform: translateY(-50%) rotate(-90deg);
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.3em;
  color: rgba(242,237,228,0.2);
  text-transform: lowercase;
  white-space: nowrap;
}
</style>
</head>
<body>
<div class="canvas">
  <div class="circle"></div>
  <div class="circle-2"></div>
  <div class="rule"></div>
  <div class="vert">weekly · ruas · builds</div>

  <div class="headline">
    <h1>your<br>professor<br>doesn't<br>know about<br><em>this.</em></h1>
  </div>

  <div class="sub">noise&amp;signal — weekly @ ruas</div>
  <div class="brand">noise&amp;signal</div>
</div>
</body>
</html>
