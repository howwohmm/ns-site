<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>02 — noise&signal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: #f2ede4;
}

.canvas {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  position: relative;
  background: #f2ede4;
}

/* Top thick bar */
.top-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 6px;
  background: #0d0d0d;
}

/* Grid lines — editorial feel */
.grid-v {
  position: absolute;
  top: 0;
  left: 540px;
  width: 1px;
  height: 100%;
  background: rgba(13,13,13,0.06);
}

.grid-h {
  position: absolute;
  top: 540px;
  left: 0;
  width: 100%;
  height: 1px;
  background: rgba(13,13,13,0.06);
}

/* Red underline accent */
.underline-accent {
  position: absolute;
  top: 512px;
  left: 72px;
  width: 390px;
  height: 5px;
  background: #E8200A;
}

.underline-accent-2 {
  position: absolute;
  top: 522px;
  left: 72px;
  width: 240px;
  height: 2px;
  background: rgba(232,32,10,0.3);
}

/* Main content */
.content {
  position: absolute;
  top: 160px;
  left: 72px;
  right: 72px;
}

.label {
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.28em;
  color: rgba(13,13,13,0.4);
  text-transform: lowercase;
  margin-bottom: 48px;
}

.headline {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 98px;
  line-height: 0.92;
  letter-spacing: -3px;
  color: #0d0d0d;
  text-transform: lowercase;
}

.headline .at {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 88px;
  color: #E8200A;
  letter-spacing: -2px;
}

/* Bottom info strip */
.bottom {
  position: absolute;
  bottom: 72px;
  left: 72px;
  right: 72px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.bottom-left {
  font-family: 'Manrope', sans-serif;
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.08em;
  color: rgba(13,13,13,0.45);
  text-transform: lowercase;
  line-height: 1.8;
}

.bottom-right {
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.2em;
  color: rgba(13,13,13,0.3);
  text-transform: lowercase;
}

/* Decorative number */
.num {
  position: absolute;
  top: 72px;
  right: 72px;
  font-family: 'Playfair Display', serif;
  font-size: 200px;
  font-weight: 700;
  color: rgba(13,13,13,0.04);
  line-height: 1;
  letter-spacing: -8px;
}
</style>
</head>
<body>
<div class="canvas">
  <div class="top-bar"></div>
  <div class="grid-v"></div>
  <div class="grid-h"></div>
  <div class="num">02</div>

  <div class="content">
    <div class="label">noise&amp;signal · ruas</div>
    <div class="headline">
      something<br>
      is happening<br>
      <span class="at">@ ruas</span><br>
      this week.
    </div>
  </div>

  <div class="underline-accent"></div>
  <div class="underline-accent-2"></div>

  <div class="bottom">
    <div class="bottom-left">
      builders · makers · curious people<br>
      weekly sessions — no slides, no theory
    </div>
    <div class="bottom-right">noise&amp;signal</div>
  </div>
</div>
</body>
</html>
