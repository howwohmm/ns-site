<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>04 — noise&signal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700;800&family=Playfair+Display:ital,wght@1,700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: #E8200A;
}

.canvas {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  position: relative;
  background: #E8200A;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Ghost concentric squares */
.sq {
  position: absolute;
  border: 1px solid rgba(242,237,228,0.08);
}
.sq-1 { width: 800px; height: 800px; top: 140px; left: 140px; }
.sq-2 { width: 600px; height: 600px; top: 240px; left: 240px; }
.sq-3 { width: 400px; height: 400px; top: 340px; left: 340px; }

/* Center content */
.center {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 0 80px;
}

/* Outlined / stroke text effect via text-stroke */
.headline {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 104px;
  line-height: 0.93;
  letter-spacing: -4px;
  text-transform: lowercase;
  color: transparent;
  -webkit-text-stroke: 2px #f2ede4;
  display: block;
  margin-bottom: 0;
}

/* "find out" — slightly larger, filled */
.headline-filled {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 130px;
  line-height: 0.88;
  letter-spacing: -5px;
  text-transform: lowercase;
  color: #f2ede4;
  -webkit-text-stroke: 0px;
  display: block;
}

.italic-line {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 700;
  font-size: 96px;
  line-height: 1.0;
  color: transparent;
  -webkit-text-stroke: 1.5px rgba(242,237,228,0.7);
  letter-spacing: -2px;
  display: block;
}

/* Divider */
.divider {
  width: 60px;
  height: 2px;
  background: rgba(242,237,228,0.4);
  margin: 32px auto;
}

/* Brand bottom */
.brand {
  position: absolute;
  bottom: 56px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.25em;
  color: rgba(242,237,228,0.3);
  text-transform: lowercase;
  white-space: nowrap;
  z-index: 2;
}

/* Corner marks */
.corner {
  position: absolute;
  width: 24px;
  height: 24px;
  z-index: 2;
}
.corner-tl { top: 48px; left: 48px; border-top: 1.5px solid rgba(242,237,228,0.3); border-left: 1.5px solid rgba(242,237,228,0.3); }
.corner-tr { top: 48px; right: 48px; border-top: 1.5px solid rgba(242,237,228,0.3); border-right: 1.5px solid rgba(242,237,228,0.3); }
.corner-bl { bottom: 48px; left: 48px; border-bottom: 1.5px solid rgba(242,237,228,0.3); border-left: 1.5px solid rgba(242,237,228,0.3); }
.corner-br { bottom: 48px; right: 48px; border-bottom: 1.5px solid rgba(242,237,228,0.3); border-right: 1.5px solid rgba(242,237,228,0.3); }
</style>
</head>
<body>
<div class="canvas">
  <div class="sq sq-1"></div>
  <div class="sq sq-2"></div>
  <div class="sq sq-3"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="center">
    <span class="headline-filled">find out</span>
    <span class="headline">before everyone</span>
    <span class="italic-line">else does.</span>
    <div class="divider"></div>
  </div>

  <div class="brand">noise&amp;signal</div>
</div>
</body>
</html>
