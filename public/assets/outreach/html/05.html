<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>05 — noise&signal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700;800&family=Playfair+Display:ital,wght@1,400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: #f2ede4;
}

.canvas {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  position: relative;
  background: #f2ede4;
}

/* Subtle warm texture overlay */
.canvas::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 80% 20%, rgba(232,32,10,0.03) 0%, transparent 60%);
  pointer-events: none;
}

/* Top minimal bar */
.top-rule {
  position: absolute;
  top: 72px;
  left: 72px;
  right: 72px;
  height: 1px;
  background: rgba(13,13,13,0.12);
}

/* Main text block — left anchored */
.content {
  position: absolute;
  top: 50%;
  left: 72px;
  right: 72px;
  transform: translateY(-50%);
}

/* "what's being built" — large, ultra-light */
.line-light {
  font-family: 'Manrope', sans-serif;
  font-weight: 300;
  font-size: 108px;
  line-height: 0.95;
  letter-spacing: -3px;
  color: rgba(13,13,13,0.55);
  text-transform: lowercase;
  display: block;
  margin-bottom: 0px;
}

/* "right now." — huge bold red */
.line-bold {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 148px;
  line-height: 0.88;
  letter-spacing: -7px;
  color: #E8200A;
  text-transform: lowercase;
  display: block;
}

/* "not what they teach." — small editorial below */
.line-sub {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 34px;
  line-height: 1.3;
  color: rgba(13,13,13,0.38);
  text-transform: lowercase;
  display: block;
  margin-top: 40px;
  letter-spacing: 0px;
}

/* Bottom strip */
.bottom {
  position: absolute;
  bottom: 60px;
  left: 72px;
  right: 72px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.bottom-rule {
  flex: 1;
  height: 1px;
  background: rgba(13,13,13,0.12);
  margin: 0 24px;
}

.brand {
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.22em;
  color: rgba(13,13,13,0.28);
  text-transform: lowercase;
}

.session-label {
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.18em;
  color: rgba(13,13,13,0.28);
  text-transform: lowercase;
}

/* Small red square decorative */
.red-sq {
  position: absolute;
  top: 68px;
  right: 72px;
  width: 8px;
  height: 8px;
  background: #E8200A;
}
</style>
</head>
<body>
<div class="canvas">
  <div class="top-rule"></div>
  <div class="red-sq"></div>

  <div class="content">
    <span class="line-light">what's being<br>built</span>
    <span class="line-bold">right now.</span>
    <span class="line-sub">not what they teach.</span>
  </div>

  <div class="bottom">
    <span class="session-label">noise&amp;signal · weekly · ruas</span>
    <div class="bottom-rule"></div>
    <span class="brand">noise&amp;signal</span>
  </div>
</div>
</body>
</html>
