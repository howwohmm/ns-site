<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>06 — noise&signal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700;800&family=Playfair+Display:ital,wght@1,400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: #E8FF47;
}

.canvas {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  position: relative;
  background: #E8FF47;
}

/* Bold black left vertical stripe */
.stripe {
  position: absolute;
  left: 0;
  top: 0;
  width: 14px;
  height: 100%;
  background: #0d0d0d;
}

/* Main massive type — fills the space */
.headline {
  position: absolute;
  top: 50%;
  left: 60px;
  right: 60px;
  transform: translateY(-50%);
}

.word {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  text-transform: lowercase;
  color: #0d0d0d;
  display: block;
  line-height: 0.87;
  letter-spacing: -6px;
}

.word-1 {
  font-size: 196px;
}

.word-2 {
  font-size: 196px;
  margin-top: 8px;
}

/* "come to this instead." slightly smaller + red period */
.word-3 {
  font-size: 108px;
  font-weight: 800;
  letter-spacing: -3px;
  margin-top: 24px;
  color: #0d0d0d;
}

.red-period {
  color: #E8200A;
}

/* Italic "instead" */
.italic {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 400;
  letter-spacing: -2px;
}

/* Brand tag — bottom right */
.brand {
  position: absolute;
  bottom: 48px;
  right: 60px;
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.22em;
  color: rgba(13,13,13,0.4);
  text-transform: lowercase;
}

/* Top label */
.top-label {
  position: absolute;
  top: 48px;
  left: 60px;
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.25em;
  color: rgba(13,13,13,0.4);
  text-transform: lowercase;
}

/* Horizontal rule under headline */
.rule {
  position: absolute;
  bottom: 100px;
  left: 60px;
  width: 80px;
  height: 3px;
  background: #E8200A;
}
</style>
</head>
<body>
<div class="canvas">
  <div class="stripe"></div>

  <div class="top-label">noise&amp;signal</div>

  <div class="headline">
    <span class="word word-1">skip</span>
    <span class="word word-2">class<span class="red-period">.</span></span>
    <span class="word word-3">come to<br><span class="italic">this</span> instead<span class="red-period">.</span></span>
  </div>

  <div class="rule"></div>
  <div class="brand">noise&amp;signal</div>
</div>
</body>
</html>
