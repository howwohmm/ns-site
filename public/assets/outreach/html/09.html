<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>09 — noise&signal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700;800&family=Playfair+Display:ital,wght@1,400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: #f2ede4;
}

.canvas {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  position: relative;
  background: #f2ede4;
}

/* Red vertical left border — thick */
.left-bar {
  position: absolute;
  left: 72px;
  top: 80px;
  bottom: 80px;
  width: 5px;
  background: #E8200A;
}

/* Very subtle tonal right panel */
.right-bg {
  position: absolute;
  right: 0;
  top: 0;
  width: 200px;
  height: 100%;
  background: rgba(13,13,13,0.03);
}

/* Main content — left aligned, generous left margin from bar */
.content {
  position: absolute;
  top: 50%;
  left: 116px;
  right: 80px;
  transform: translateY(-50%);
}

.pretext {
  font-family: 'Manrope', sans-serif;
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.25em;
  color: rgba(13,13,13,0.4);
  text-transform: lowercase;
  margin-bottom: 32px;
  display: block;
}

/* "the stuff" — small light weight, editorial opener */
.opener {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 52px;
  line-height: 1.1;
  color: rgba(13,13,13,0.45);
  display: block;
  margin-bottom: 4px;
}

/* "your curriculum" — medium */
.mid {
  font-family: 'Manrope', sans-serif;
  font-weight: 300;
  font-size: 80px;
  line-height: 0.95;
  letter-spacing: -2px;
  color: rgba(13,13,13,0.7);
  text-transform: lowercase;
  display: block;
}

/* "won't cover" — bold large */
.bold {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 96px;
  line-height: 0.9;
  letter-spacing: -4px;
  color: #0d0d0d;
  text-transform: lowercase;
  display: block;
  margin-top: 8px;
}

/* "for 3 years." — red accent */
.accent {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 96px;
  line-height: 0.9;
  letter-spacing: -4px;
  color: #E8200A;
  text-transform: lowercase;
  display: block;
}

/* Bottom */
.bottom {
  position: absolute;
  bottom: 60px;
  left: 116px;
  right: 80px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand {
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.22em;
  color: rgba(13,13,13,0.25);
  text-transform: lowercase;
}

.label {
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.18em;
  color: rgba(13,13,13,0.3);
  text-transform: lowercase;
}

/* Top rule */
.top-rule {
  position: absolute;
  top: 56px;
  left: 116px;
  right: 80px;
  height: 1px;
  background: rgba(13,13,13,0.1);
}
</style>
</head>
<body>
<div class="canvas">
  <div class="right-bg"></div>
  <div class="left-bar"></div>
  <div class="top-rule"></div>

  <div class="content">
    <span class="pretext">noise&amp;signal</span>
    <span class="opener">the stuff</span>
    <span class="mid">your curriculum</span>
    <span class="bold">won't cover</span>
    <span class="accent">for 3 years.</span>
  </div>

  <div class="bottom">
    <span class="label">weekly · ruas · builders</span>
    <span class="brand">noise&amp;signal</span>
  </div>
</div>
</body>
</html>
