<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>10 — noise&signal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700;800&family=Playfair+Display:ital,wght@1,400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: #E8200A;
}

.canvas {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  position: relative;
  background: #E8200A;
}

/* Big abstract "X" geometry — two diagonal lines */
.diag-1 {
  position: absolute;
  top: -100px;
  right: 160px;
  width: 1px;
  height: 1400px;
  background: rgba(242,237,228,0.06);
  transform: rotate(20deg);
  transform-origin: top center;
}

.diag-2 {
  position: absolute;
  top: -100px;
  right: 280px;
  width: 1px;
  height: 1400px;
  background: rgba(242,237,228,0.04);
  transform: rotate(-15deg);
  transform-origin: top center;
}

/* Main stacked text block */
.content {
  position: absolute;
  top: 50%;
  left: 72px;
  right: 72px;
  transform: translateY(-52%);
}

/* Line 1 — "ground" thin */
.l1 {
  font-family: 'Manrope', sans-serif;
  font-weight: 300;
  font-size: 130px;
  line-height: 0.88;
  letter-spacing: -5px;
  color: rgba(242,237,228,0.7);
  text-transform: lowercase;
  display: block;
}

/* Line 2 — "reality." bold */
.l2 {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 130px;
  line-height: 0.88;
  letter-spacing: -5px;
  color: #f2ede4;
  text-transform: lowercase;
  display: block;
  margin-bottom: 20px;
}

/* Line 3 — "no slides." medium */
.l3 {
  font-family: 'Manrope', sans-serif;
  font-weight: 700;
  font-size: 96px;
  line-height: 0.9;
  letter-spacing: -3px;
  color: rgba(242,237,228,0.55);
  text-transform: lowercase;
  display: block;
}

/* Line 4 — "no theory." bold */
.l4 {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 96px;
  line-height: 0.9;
  letter-spacing: -3px;
  color: #f2ede4;
  text-transform: lowercase;
  display: block;
}

/* Italic interlude */
.interlude {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 28px;
  color: rgba(242,237,228,0.4);
  display: block;
  margin: 16px 0 12px;
  letter-spacing: 0.02em;
}

/* Bottom */
.bottom {
  position: absolute;
  bottom: 56px;
  left: 72px;
  right: 72px;
  display: flex;
  justify-content: space-between;
}

.brand {
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.22em;
  color: rgba(242,237,228,0.3);
  text-transform: lowercase;
}

/* Left margin number */
.num {
  position: absolute;
  top: 56px;
  right: 72px;
  font-family: 'Manrope', sans-serif;
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 0.2em;
  color: rgba(242,237,228,0.25);
}
</style>
</head>
<body>
<div class="canvas">
  <div class="diag-1"></div>
  <div class="diag-2"></div>
  <div class="num">10</div>

  <div class="content">
    <span class="l1">ground</span>
    <span class="l2">reality.</span>
    <span class="interlude">— no filters, no fluff</span>
    <span class="l3">no slides.</span>
    <span class="l4">no theory.</span>
  </div>

  <div class="bottom">
    <span class="brand">noise&amp;signal</span>
    <span class="brand">weekly · ruas</span>
  </div>
</div>
</body>
</html>
