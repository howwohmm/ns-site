<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>11 — noise&signal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700;800&family=Playfair+Display:ital,wght@1,400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: #0d0d0d;
}

.canvas {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  position: relative;
  background: #0d0d0d;
}

/* Red glow — upper left, for the "missed" line */
.glow-dim {
  position: absolute;
  top: 200px;
  left: -80px;
  width: 500px;
  height: 300px;
  background: radial-gradient(ellipse, rgba(232,32,10,0.05) 0%, transparent 70%);
  pointer-events: none;
}

/* Bright glow — lower, for the bold line */
.glow-bright {
  position: absolute;
  bottom: 160px;
  left: -80px;
  width: 700px;
  height: 300px;
  background: radial-gradient(ellipse, rgba(242,237,228,0.04) 0%, transparent 70%);
  pointer-events: none;
}

/* Content centered */
.content {
  position: absolute;
  top: 50%;
  left: 72px;
  right: 72px;
  transform: translateY(-50%);
}

/* First line — dim, with strikethrough visual */
.line-crossed {
  font-family: 'Manrope', sans-serif;
  font-weight: 700;
  font-size: 72px;
  line-height: 0.95;
  letter-spacing: -2px;
  color: rgba(242,237,228,0.2);
  text-transform: lowercase;
  display: block;
  position: relative;
  margin-bottom: 8px;
}

/* Strikethrough line */
.line-crossed::after {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  width: 100%;
  height: 2px;
  background: rgba(232,32,10,0.4);
  transform: translateY(-50%);
}

.line-crossed-2 {
  font-family: 'Manrope', sans-serif;
  font-weight: 700;
  font-size: 72px;
  line-height: 0.95;
  letter-spacing: -2px;
  color: rgba(242,237,228,0.2);
  text-transform: lowercase;
  display: block;
  position: relative;
  margin-bottom: 48px;
}

.line-crossed-2::after {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  width: 70%;
  height: 2px;
  background: rgba(232,32,10,0.3);
  transform: translateY(-50%);
}

/* Divider — with red dot */
.div-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 40px;
}

.div-line {
  flex: 1;
  height: 1px;
  background: rgba(242,237,228,0.08);
}

.div-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #E8200A;
}

/* Second line — BOLD white */
.line-bold {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 112px;
  line-height: 0.9;
  letter-spacing: -4px;
  color: #f2ede4;
  text-transform: lowercase;
  display: block;
}

.line-bold-2 {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 112px;
  line-height: 0.9;
  letter-spacing: -4px;
  color: #f2ede4;
  text-transform: lowercase;
  display: block;
}

.em {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  color: #f2ede4;
}

/* Brand */
.brand {
  position: absolute;
  bottom: 56px;
  right: 72px;
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.22em;
  color: rgba(242,237,228,0.2);
  text-transform: lowercase;
}

.top-label {
  position: absolute;
  top: 56px;
  left: 72px;
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.28em;
  color: rgba(242,237,228,0.18);
  text-transform: lowercase;
}
</style>
</head>
<body>
<div class="canvas">
  <div class="glow-dim"></div>
  <div class="glow-bright"></div>
  <div class="top-label">noise&amp;signal</div>

  <div class="content">
    <span class="line-crossed">you already missed</span>
    <span class="line-crossed-2">last week.</span>
    <div class="div-row">
      <div class="div-line"></div>
      <div class="div-dot"></div>
      <div class="div-line"></div>
    </div>
    <span class="line-bold">don't miss</span>
    <span class="line-bold-2"><span class="em">this one.</span></span>
  </div>

  <div class="brand">noise&amp;signal</div>
</div>
</body>
</html>
