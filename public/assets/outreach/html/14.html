<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>14 — noise&signal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700;800&family=Playfair+Display:ital,wght@1,400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: #E8200A;
}

.canvas {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  position: relative;
  background: #E8200A;
}

/* Top third content */
.top-half {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 480px;
  display: flex;
  align-items: center;
  padding: 0 80px;
}

/* Bold horizontal rule — the separator */
.hr {
  position: absolute;
  top: 480px;
  left: 0;
  right: 0;
  height: 6px;
  background: #f2ede4;
}

/* Bottom third */
.bottom-half {
  position: absolute;
  top: 486px;
  left: 0;
  right: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  padding: 0 80px;
}

/* Top text */
.top-text {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 140px;
  line-height: 0.88;
  letter-spacing: -6px;
  color: #f2ede4;
  text-transform: lowercase;
}

.top-text em {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 120px;
  letter-spacing: -3px;
}

/* Bottom text */
.bottom-text {
  font-family: 'Manrope', sans-serif;
  font-weight: 300;
  font-size: 80px;
  line-height: 0.95;
  letter-spacing: -2px;
  color: #f2ede4;
  text-transform: lowercase;
}

.bottom-text strong {
  font-weight: 800;
  font-size: 88px;
  letter-spacing: -3px;
}

/* Brand */
.brand {
  position: absolute;
  bottom: 48px;
  right: 80px;
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.22em;
  color: rgba(242,237,228,0.3);
  text-transform: lowercase;
}

/* Top right label */
.top-brand {
  position: absolute;
  top: 48px;
  right: 80px;
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.25em;
  color: rgba(242,237,228,0.3);
  text-transform: lowercase;
}

/* Subtle circles */
.circle-ghost {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(242,237,228,0.06);
}

.cg-1 { width: 600px; height: 600px; top: -300px; right: -200px; }
.cg-2 { width: 400px; height: 400px; top: -200px; right: -100px; }
</style>
</head>
<body>
<div class="canvas">
  <div class="circle-ghost cg-1"></div>
  <div class="circle-ghost cg-2"></div>
  <div class="top-brand">noise&amp;signal</div>

  <div class="top-half">
    <div class="top-text">built by<br><em>second years.</em></div>
  </div>

  <div class="hr"></div>

  <div class="bottom-half">
    <div class="bottom-text">for <strong>everyone.</strong></div>
  </div>

  <div class="brand">noise&amp;signal</div>
</div>
</body>
</html>
