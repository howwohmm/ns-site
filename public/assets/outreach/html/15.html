<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>15 — noise&signal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700;800&family=Playfair+Display:ital,wght@1,400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: #0d0d0d;
}

.canvas {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  position: relative;
  background: #0d0d0d;
}

/* Noise texture via repeating gradient */
.canvas::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0.4;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* Thin left rule */
.left-rule {
  position: absolute;
  left: 72px;
  top: 80px;
  bottom: 80px;
  width: 1px;
  background: linear-gradient(180deg, transparent, rgba(242,237,228,0.1) 30%, rgba(242,237,228,0.1) 70%, transparent);
}

/* Three massive words stacked */
.words {
  position: absolute;
  top: 50%;
  left: 100px;
  right: 72px;
  transform: translateY(-50%);
}

.word {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 200px;
  line-height: 0.84;
  letter-spacing: -10px;
  text-transform: lowercase;
  display: block;
}

/* word 1 — cream */
.w1 { color: #f2ede4; }

/* word 2 — red */
.w2 { color: #E8200A; }

/* word 3 — cream lighter */
.w3 {
  color: #f2ede4;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 140px;
  letter-spacing: -4px;
  color: rgba(242,237,228,0.7);
}

/* Period in red after "this week" */
.red { color: #E8200A; }

/* Bottom */
.brand {
  position: absolute;
  bottom: 56px;
  right: 72px;
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.22em;
  color: rgba(242,237,228,0.2);
  text-transform: lowercase;
}

.top-label {
  position: absolute;
  top: 56px;
  right: 72px;
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.28em;
  color: rgba(242,237,228,0.18);
  text-transform: lowercase;
}

/* Small tick marks on left rule */
.tick {
  position: absolute;
  left: 68px;
  width: 9px;
  height: 1px;
  background: rgba(242,237,228,0.15);
}
.t1 { top: 80px; }
.t2 { top: 50%; }
.t3 { bottom: 80px; }
</style>
</head>
<body>
<div class="canvas">
  <div class="left-rule"></div>
  <div class="tick t1"></div>
  <div class="tick t2"></div>
  <div class="tick t3"></div>
  <div class="top-label">noise&amp;signal</div>

  <div class="words">
    <span class="word w1">informal<span class="red">.</span></span>
    <span class="word w2">honest<span style="color:#f2ede4">.</span></span>
    <span class="word w3">this week.</span>
  </div>

  <div class="brand">noise&amp;signal</div>
</div>
</body>
</html>
