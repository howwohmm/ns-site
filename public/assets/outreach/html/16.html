<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>16 — noise&signal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700;800&family=Playfair+Display:ital,wght@1,400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: #E8FF47;
}

.canvas {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  position: relative;
  background: #E8FF47;
}

/* HUGE ghost question mark behind everything */
.ghost-qmark {
  position: absolute;
  top: -120px;
  right: -60px;
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 900px;
  line-height: 1;
  color: rgba(13,13,13,0.06);
  pointer-events: none;
  user-select: none;
  letter-spacing: -20px;
}

/* Bottom stripe */
.bottom-stripe {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 8px;
  background: #0d0d0d;
}

/* Main content */
.content {
  position: absolute;
  top: 50%;
  left: 72px;
  right: 72px;
  transform: translateY(-50%);
  z-index: 2;
}

.label {
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.28em;
  color: rgba(13,13,13,0.45);
  text-transform: lowercase;
  display: block;
  margin-bottom: 32px;
}

.q-small {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 40px;
  color: rgba(13,13,13,0.5);
  display: block;
  margin-bottom: 8px;
}

.headline {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 108px;
  line-height: 0.9;
  letter-spacing: -4px;
  color: #0d0d0d;
  text-transform: lowercase;
  display: block;
}

.headline-2 {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 108px;
  line-height: 0.9;
  letter-spacing: -4px;
  color: #0d0d0d;
  text-transform: lowercase;
  display: block;
}

.headline-3 {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 108px;
  line-height: 0.9;
  letter-spacing: -4px;
  color: #0d0d0d;
  text-transform: lowercase;
  display: block;
}

.with-ai {
  color: #E8200A;
}

/* Bottom */
.brand {
  position: absolute;
  bottom: 40px;
  right: 72px;
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.22em;
  color: rgba(13,13,13,0.35);
  text-transform: lowercase;
  z-index: 2;
}

.brand-left {
  position: absolute;
  bottom: 40px;
  left: 72px;
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.2em;
  color: rgba(13,13,13,0.35);
  text-transform: lowercase;
  z-index: 2;
}
</style>
</head>
<body>
<div class="canvas">
  <div class="ghost-qmark">?</div>
  <div class="bottom-stripe"></div>

  <div class="content">
    <span class="label">noise&amp;signal · ruas</span>
    <span class="q-small">what are people</span>
    <span class="headline">your age</span>
    <span class="headline-2">building</span>
    <span class="headline-3">with <span class="with-ai">AI?</span></span>
  </div>

  <div class="brand-left">noise&amp;signal</div>
  <div class="brand">weekly sessions</div>
</div>
</body>
</html>
