<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>17 — noise&signal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700;800&family=Playfair+Display:ital,wght@1,400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: #E8200A;
}

.canvas {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  position: relative;
  background: #E8200A;
}

/* Horizontal divide — upper 55% vs lower 45% */
.divider-h {
  position: absolute;
  top: 560px;
  left: 0;
  right: 0;
  height: 4px;
  background: #f2ede4;
}

/* Top text area — outlined/stroke style */
.top-area {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 560px;
  display: flex;
  align-items: center;
  padding: 80px;
}

.top-text {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 100px;
  line-height: 0.9;
  letter-spacing: -4px;
  text-transform: lowercase;
  color: transparent;
  -webkit-text-stroke: 2px rgba(242,237,228,0.7);
}

.top-text-2 {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 100px;
  line-height: 0.9;
  letter-spacing: -4px;
  text-transform: lowercase;
  color: transparent;
  -webkit-text-stroke: 2px rgba(242,237,228,0.7);
  margin-top: 8px;
}

/* Bottom text area — filled style */
.bottom-area {
  position: absolute;
  top: 564px;
  left: 0;
  right: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  padding: 0 80px;
}

.bottom-text {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 148px;
  line-height: 0.88;
  letter-spacing: -7px;
  text-transform: lowercase;
  color: #f2ede4;
}

.bottom-text em {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 120px;
  letter-spacing: -4px;
}

/* Subtle background pattern top half */
.bg-lines {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 560px;
  background: repeating-linear-gradient(
    -45deg,
    transparent,
    transparent 40px,
    rgba(242,237,228,0.03) 40px,
    rgba(242,237,228,0.03) 41px
  );
  pointer-events: none;
}

/* Brand */
.brand {
  position: absolute;
  bottom: 48px;
  right: 80px;
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.22em;
  color: rgba(242,237,228,0.3);
  text-transform: lowercase;
}

.top-label {
  position: absolute;
  top: 52px;
  left: 80px;
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.25em;
  color: rgba(242,237,228,0.3);
  text-transform: lowercase;
}
</style>
</head>
<body>
<div class="canvas">
  <div class="bg-lines"></div>
  <div class="divider-h"></div>
  <div class="top-label">noise&amp;signal</div>

  <div class="top-area">
    <div>
      <div class="top-text">the real</div>
      <div class="top-text-2">AI feed.</div>
    </div>
  </div>

  <div class="bottom-area">
    <div class="bottom-text"><em>weekly.</em></div>
  </div>

  <div class="brand">noise&amp;signal</div>
</div>
</body>
</html>
