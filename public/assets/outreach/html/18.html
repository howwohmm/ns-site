<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>18 — noise&signal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700;800&family=Playfair+Display:ital,wght@1,400&family=Space+Mono:wght@400;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: #f2ede4;
}

.canvas {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  position: relative;
  background: #f2ede4;
}

/* Subtle dot grid */
.canvas::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(13,13,13,0.08) 1px, transparent 1px);
  background-size: 36px 36px;
  pointer-events: none;
}

/* Center block — generous padding, minimal */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  width: 800px;
  z-index: 1;
}

/* "register." — monospace feel using Space Mono */
.main-1 {
  font-family: 'Space Mono', monospace;
  font-weight: 400;
  font-size: 88px;
  line-height: 1.0;
  letter-spacing: -2px;
  color: #0d0d0d;
  text-transform: lowercase;
  display: block;
  margin-bottom: 0;
}

/* Underline accent */
.underline-block {
  position: relative;
  display: inline-block;
  margin: 16px auto;
}

.underline-red {
  width: 320px;
  height: 3px;
  background: #E8200A;
  margin: 0 auto;
}

.underline-red-thin {
  width: 200px;
  height: 1px;
  background: rgba(232,32,10,0.35);
  margin: 6px auto 0;
}

/* "details drop" — slightly smaller, lighter weight */
.main-2 {
  font-family: 'Space Mono', monospace;
  font-weight: 400;
  font-size: 40px;
  line-height: 1.3;
  letter-spacing: -1px;
  color: rgba(13,13,13,0.4);
  text-transform: lowercase;
  display: block;
  margin-top: 32px;
}

.main-2 span {
  color: #0d0d0d;
  font-weight: 700;
}

/* Brackets decoration */
.bracket-l, .bracket-r {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'Space Mono', monospace;
  font-size: 200px;
  color: rgba(13,13,13,0.05);
  line-height: 1;
}

.bracket-l { left: 40px; }
.bracket-r { right: 40px; }

/* Brand */
.brand {
  position: absolute;
  bottom: 56px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.22em;
  color: rgba(13,13,13,0.28);
  text-transform: lowercase;
  white-space: nowrap;
  z-index: 1;
}

/* Corner marks — minimal */
.corner {
  position: absolute;
  width: 16px;
  height: 16px;
  z-index: 1;
}
.corner-tl { top: 56px; left: 56px; border-top: 1px solid rgba(13,13,13,0.2); border-left: 1px solid rgba(13,13,13,0.2); }
.corner-tr { top: 56px; right: 56px; border-top: 1px solid rgba(13,13,13,0.2); border-right: 1px solid rgba(13,13,13,0.2); }
.corner-bl { bottom: 56px; left: 56px; border-bottom: 1px solid rgba(13,13,13,0.2); border-left: 1px solid rgba(13,13,13,0.2); }
.corner-br { bottom: 56px; right: 56px; border-bottom: 1px solid rgba(13,13,13,0.2); border-right: 1px solid rgba(13,13,13,0.2); }
</style>
</head>
<body>
<div class="canvas">
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <span class="bracket-l">[</span>
  <span class="bracket-r">]</span>

  <div class="center">
    <span class="main-1">register.</span>
    <div class="underline-red"></div>
    <div class="underline-red-thin"></div>
    <span class="main-2">details drop <span>24hrs before.</span></span>
  </div>

  <div class="brand">noise&amp;signal</div>
</div>
</body>
</html>
