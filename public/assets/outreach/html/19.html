<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>19 — noise&signal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700;800&family=Playfair+Display:ital,wght@1,400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: #0d0d0d;
}

.canvas {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  position: relative;
  background: #0d0d0d;
}

/* Atmospheric vignette + glow — rightward */
.canvas::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 90% 50%, rgba(232,32,10,0.08) 0%, transparent 60%);
  pointer-events: none;
}

/* Thin rules — structural */
.rule-top {
  position: absolute;
  top: 80px;
  left: 72px;
  right: 72px;
  height: 1px;
  background: rgba(242,237,228,0.08);
}

.rule-bottom {
  position: absolute;
  bottom: 100px;
  left: 72px;
  right: 72px;
  height: 1px;
  background: rgba(242,237,228,0.08);
}

/* Main text — bottom weighted */
.content {
  position: absolute;
  bottom: 148px;
  left: 72px;
  right: 72px;
}

/* "share this with" — featherweight */
.line-light {
  font-family: 'Manrope', sans-serif;
  font-weight: 300;
  font-size: 72px;
  line-height: 0.95;
  letter-spacing: -2px;
  color: rgba(242,237,228,0.45);
  text-transform: lowercase;
  display: block;
  margin-bottom: 8px;
}

/* "one person" — medium */
.line-mid {
  font-family: 'Manrope', sans-serif;
  font-weight: 700;
  font-size: 96px;
  line-height: 0.92;
  letter-spacing: -3px;
  color: rgba(242,237,228,0.7);
  text-transform: lowercase;
  display: block;
  margin-bottom: 8px;
}

/* "who belongs." — bold red */
.line-red {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 128px;
  line-height: 0.88;
  letter-spacing: -5px;
  color: #E8200A;
  text-transform: lowercase;
  display: block;
}

.line-red em {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 108px;
  letter-spacing: -3px;
}

/* Top area — sparse editorial text */
.top-content {
  position: absolute;
  top: 108px;
  left: 72px;
  right: 72px;
}

.top-text {
  font-family: 'Manrope', sans-serif;
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.2em;
  color: rgba(242,237,228,0.25);
  text-transform: lowercase;
  line-height: 1.9;
  display: block;
}

/* Brand */
.brand {
  position: absolute;
  bottom: 52px;
  right: 72px;
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.22em;
  color: rgba(242,237,228,0.2);
  text-transform: lowercase;
}
</style>
</head>
<body>
<div class="canvas">
  <div class="rule-top"></div>
  <div class="rule-bottom"></div>

  <div class="top-content">
    <span class="top-text">noise&amp;signal · weekly · ruas</span>
    <span class="top-text">if you know someone who should be here —</span>
  </div>

  <div class="content">
    <span class="line-light">share this with</span>
    <span class="line-mid">one person</span>
    <span class="line-red"><em>who belongs.</em></span>
  </div>

  <div class="brand">noise&amp;signal</div>
</div>
</body>
</html>
