<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>20 — noise&signal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700;800&family=Playfair+Display:ital,wght@1,400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
}

.canvas {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  position: relative;
}

/* LEFT HALF — red */
.left-half {
  position: absolute;
  top: 0;
  left: 0;
  width: 540px;
  height: 1080px;
  background: #E8200A;
  overflow: hidden;
}

/* RIGHT HALF — cream */
.right-half {
  position: absolute;
  top: 0;
  right: 0;
  width: 540px;
  height: 1080px;
  background: #f2ede4;
  overflow: hidden;
}

/* Center dividing line */
.center-line {
  position: absolute;
  top: 0;
  left: 540px;
  width: 2px;
  height: 100%;
  background: #0d0d0d;
  z-index: 10;
}

/* TEXT — rendered twice, clipped to each half */
/* Container spans full width, centered */
.text-layer {
  position: absolute;
  top: 0;
  left: 0;
  width: 1080px;
  height: 1080px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 5;
}

.headline {
  text-align: center;
  position: relative;
}

.line-1 {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 108px;
  line-height: 0.9;
  letter-spacing: -4px;
  text-transform: lowercase;
  display: block;
}

.line-2 {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 80px;
  line-height: 1.0;
  letter-spacing: -2px;
  display: block;
  margin-top: 12px;
}

.line-3 {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 108px;
  line-height: 0.9;
  letter-spacing: -4px;
  text-transform: lowercase;
  display: block;
  margin-top: 4px;
}

/* LEFT text — cream on red */
.text-left {
  position: absolute;
  top: 0;
  left: 0;
  width: 540px;
  height: 1080px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 6;
}

.text-left .headline {
  width: 1080px;
  margin-left: 0;
  position: relative;
  left: 270px; /* offset to center relative to full width */
}

.text-left .line-1,
.text-left .line-2,
.text-left .line-3 {
  color: #f2ede4;
}

/* RIGHT text — red on cream */
.text-right {
  position: absolute;
  top: 0;
  right: 0;
  width: 540px;
  height: 1080px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 6;
}

.text-right .headline {
  width: 1080px;
  position: relative;
  right: 270px; /* offset other direction */
}

.text-right .line-1,
.text-right .line-2,
.text-right .line-3 {
  color: #E8200A;
}

/* Decorative elements */
/* Red half — vertical accent line */
.left-accent {
  position: absolute;
  left: 72px;
  top: 80px;
  bottom: 80px;
  width: 1px;
  background: rgba(242,237,228,0.12);
  z-index: 7;
}

/* Cream half — vertical accent line */
.right-accent {
  position: absolute;
  right: 72px;
  top: 80px;
  bottom: 80px;
  width: 1px;
  background: rgba(13,13,13,0.1);
  z-index: 7;
}

/* Brand tags */
.brand-left {
  position: absolute;
  bottom: 56px;
  left: 72px;
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.22em;
  color: rgba(242,237,228,0.35);
  text-transform: lowercase;
  z-index: 8;
}

.brand-right {
  position: absolute;
  bottom: 56px;
  right: 72px;
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.22em;
  color: rgba(13,13,13,0.3);
  text-transform: lowercase;
  z-index: 8;
}

/* Top labels */
.label-left {
  position: absolute;
  top: 56px;
  left: 72px;
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.25em;
  color: rgba(242,237,228,0.3);
  text-transform: lowercase;
  z-index: 8;
}

.label-right {
  position: absolute;
  top: 56px;
  right: 72px;
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 300;
  letter-spacing: 0.25em;
  color: rgba(13,13,13,0.3);
  text-transform: lowercase;
  z-index: 8;
}

/* is live. dot */
.live-dot {
  display: inline-block;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: currentColor;
  vertical-align: middle;
  margin-bottom: 6px;
  margin-right: 4px;
}
</style>
</head>
<body>
<div class="canvas">
  <!-- Backgrounds -->
  <div class="left-half"></div>
  <div class="right-half"></div>
  <div class="center-line"></div>

  <!-- Decorative accents -->
  <div class="left-accent"></div>
  <div class="right-accent"></div>

  <!-- Labels -->
  <div class="label-left">n&amp;s</div>
  <div class="label-right">n&amp;s</div>

  <!-- Left text — cream on red -->
  <div class="text-left">
    <div class="headline">
      <span class="line-1">noise&amp;</span>
      <span class="line-2">signal</span>
      <span class="line-3">is live.</span>
    </div>
  </div>

  <!-- Right text — red on cream -->
  <div class="text-right">
    <div class="headline">
      <span class="line-1">noise&amp;</span>
      <span class="line-2">signal</span>
      <span class="line-3">is live.</span>
    </div>
  </div>

  <!-- Brand -->
  <div class="brand-left">noise&amp;signal</div>
  <div class="brand-right">noise&amp;signal</div>
</div>
</body>
</html>
