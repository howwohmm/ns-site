<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <!-- left half red -->
  <rect x="0" y="0" width="300" height="600" fill="#E8200A"/>
  <!-- right half cream -->
  <rect x="300" y="0" width="300" height="600" fill="#f2ede4"/>
  <!-- "noise" clipped left -->
  <clipPath id="left"><rect x="0" y="0" width="300" height="600"/></clipPath>
  <clipPath id="right"><rect x="300" y="0" width="300" height="600"/></clipPath>
  <text clip-path="url(#left)" x="300" y="290" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="900" fill="#f2ede4" text-anchor="middle" letter-spacing="-3">noise&amp;signal</text>
  <text clip-path="url(#right)" x="300" y="290" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="900" fill="#0d0d0d" text-anchor="middle" letter-spacing="-3">noise&amp;signal</text>
  <!-- divider -->
  <line x1="300" y1="0" x2="300" y2="600" stroke="#0d0d0d" stroke-width="2"/>
  <text x="300" y="370" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#E8200A" text-anchor="middle">by ohm.</text>
</svg>
