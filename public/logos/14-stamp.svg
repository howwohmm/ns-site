  <rect x="60" y="60" width="480" height="480" fill="none" stroke="#E8200A" stroke-width="4" stroke-dasharray="0,0"/>
  <rect x="76" y="76" width="448" height="448" fill="none" stroke="#E8200A" stroke-width="1.5" opacity="0.4"/>
  <!-- perforated edge dots top -->
