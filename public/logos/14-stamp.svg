  <text x="300" y="330" font-family="Arial, Helvetica, sans-serif" font-size="148" font-weight="900" fill="#E8200A" text-anchor="middle" letter-spacing="-5">&amp;</text>
  <line x1="100" y1="370" x2="500" y2="370" stroke="#E8200A" stroke-width="1" opacity="0.3"/>
  <text x="300" y="426" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#E8200A" text-anchor="middle" letter-spacing="8">SIGNAL</text>
  <text x="300" y="490" font-family="Arial, sans-serif" font-size="11" font-weight="300" fill="rgba(232,32,10,0.4)" text-anchor="middle" letter-spacing="4">RUAS · BENGALURU</text>
